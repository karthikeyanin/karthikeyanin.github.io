<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    :root {
      color-scheme: light;
      background: #f7f3ef;
      color: #1f1f1f;
      font-family: Georgia, 'Times New Roman', serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #f7f3ef; }
    .page { max-width: 920px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
    .meta, .section-label { font-family: 'JetBrains Mono', monospace; color: #8c7563; letter-spacing: 0.12em; text-transform: uppercase; font-size: 0.82rem; }
    .top-nav { margin-bottom: 1rem; }
    .top-nav a { color: #8c7563; text-decoration: none; border-bottom: 1px dashed transparent; transition: color 0.2s, border-color 0.2s; }
    .top-nav a:hover { color: #1f1f1f; border-color: #8c7563; }
    .article-card { background: #ffffff; border: 1px solid #d6cec2; border-radius: 20px; padding: 2.25rem; box-shadow: 0 30px 70px rgba(0,0,0,0.08); }
    .article-header { margin-bottom: 2rem; }
    h1 { font-size: clamp(2.8rem, 5vw, 3.8rem); line-height: 1.05; margin: 0 0 1rem; }
    .eyebrow { display: inline-block; margin-bottom: 1.5rem; }
    .hero-image { width: 100%; border-radius: 16px; object-fit: cover; height: 360px; margin-bottom: 2rem; border: 1px solid #d6cec2; }
    .content p { margin-bottom: 1.75rem; font-size: 1.05rem; line-height: 1.9; color: #4e4a46; }
    strong { color: #1f1f1f; }
    blockquote { margin: 2rem 0; padding-left: 1.2rem; border-left: 4px solid #8c7563; color: #6d6159; font-style: italic; background: #fbf6f1; }
    .footer-note { margin-top: 2.75rem; color: #8c7563; font-size: 0.95rem; }
    @media (max-width: 700px) {
      .page { padding: 1.5rem 1rem 3rem; }
      .hero-image { height: 240px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top-nav"><a href="/blog/posts/">← Back to posts</a></div>
    <article class="article-card">
      <div class="article-header">
        <div class="eyebrow">{{CATEGORY}}</div>
        <h1>{{TITLE}}</h1>
        <div class="meta">{{DATE}}</div>
      </div>
      <img src="{{IMAGE_URL}}" alt="Post Hero Image" class="hero-image" onerror="this.style.display='none'">
      <div class="content">
        {{CONTENT}}
      </div>
      <div class="footer-note">Static article • Newspaper-inspired layout • Built for GitHub Pages</div>
    </article>
  </div>
</body>
</html>
