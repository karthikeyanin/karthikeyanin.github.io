<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{TITLE}}</title>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #060A14;
      color: #E2E8F0;
      line-height: 1.8;
      font-size: 1.15rem;
      max-width: 700px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }
    a { color: #4F9EFF; }
    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; margin-bottom: 0.5rem; line-height: 1.2; }
    .meta { color: #718096; font-size: 0.9rem; font-family: 'JetBrains Mono', monospace; margin-bottom: 2rem; }
    p { margin-bottom: 1.5rem; }
    blockquote { border-left: 4px solid #4F9EFF; padding-left: 1rem; color: #A0AEC0; font-style: italic; }
    
    /* Hero Image Styles */
    .hero-image {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 3rem;
      border: 1px solid #1A2540;
    }
  </style>
</head>
<body>
  <a href="/blog/posts/" style="font-size: 0.9rem; text-decoration:none;">&#8592; Back to Posts</a>
  <h1>{{TITLE}}</h1>
  <div class="meta">{{DATE}}</div>
  
  <img src="{{IMAGE_URL}}" alt="Post Hero Image" class="hero-image" onerror="this.style.display='none'">
  
  <div class="content">
    {{CONTENT}}
  </div>
</body>
</html>
